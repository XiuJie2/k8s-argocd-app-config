apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ntub-argo-application
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/XiuJie2/k8s-argocd-app-config.git
    targetRevision: HEAD
    path: k8s
  destination: 
    server: https://kubernetes.default.svc
    namespace: NTUB

  syncPolicy:
    syncOptions:
    - CreateNamespace=true

    automated:
      selfHeal: true
      prune: true